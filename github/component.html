<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Component</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <button
        type="button"
        class="btn-footer"
        id="openFeedbackBtn"
        aria-haspopup="dialog"
        aria-controls="feedbackModal"
    >
        See a Bug?
    </button>

    <div class="modal-backdrop" id="feedbackModalBackdrop" aria-hidden="true">
        <div
            class="modal"
            id="feedbackModal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="feedbackModalTitle"
            tabindex="-1"
        >
            <div class="modal-header">
                <h2 id="feedbackModalTitle">Feedback/Bug Report</h2>
                <button
                    type="button"
                    class="modal-close"
                    id="closeFeedbackBtn"
                    aria-label="Close"
                >
                    &times;
                </button>
            </div>
            <form class="modal-form" id="feedbackForm">
                <div>
                    <label for="feedbackTitle">Title</label>
                    <input
                        type="text"
                        id="feedbackTitle"
                        name="title"
                        required
                        autocomplete="off"
                        placeholder="Short summary"
                    />
                </div>
                <div>
                    <label for="feedbackDescription">Description</label>
                    <textarea
                        id="feedbackDescription"
                        name="description"
                        required
                        placeholder="Details…"
                    ></textarea>
                </div>
                <div>
                    <label for="feedbackOption">Type</label>
                    <select id="feedbackOption" name="option" required>
                        <option value="" disabled selected>Choose…</option>
                        <option value="feedback">Feedback</option>
                        <option value="bug">Bug Report</option>
                        <option value="feature">Feature Request</option>
                    </select>
                </div>
                <div>
                    <label for="feedbackEmail">Email (Optional)</label>
                    <input
                        type="email"
                        id="feedbackEmail"
                        name="email"
                        autocomplete="email"
                        placeholder="your@email.com"
                    />
                </div>
                <p class="modal-status" id="feedbackStatus" role="status"></p>
                <button type="submit" class="btn btn-submit" id="feedbackSubmitBtn">
                    Submit Feedback
                </button>
            </form>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         * Update these values to match your repository and server setup.
         */
        const CONFIG = {
            owner: 'YOUR_GITHUB_USERNAME',
            repo: 'YOUR_REPO_NAME',
            endpoint: '/feedback' // Prefix defined in generic-index.js
        };

        (function initFeedbackModal() {
            const backdrop = document.getElementById("feedbackModalBackdrop");
            const modal = document.getElementById("feedbackModal");
            const openBtn = document.getElementById("openFeedbackBtn");
            const closeBtn = document.getElementById("closeFeedbackBtn");
            const form = document.getElementById("feedbackForm");
            const statusEl = document.getElementById("feedbackStatus");
            const submitBtn = document.getElementById("feedbackSubmitBtn");
            let lastFocus = null;

            function openModal() {
                lastFocus = document.activeElement;
                backdrop.classList.add("is-open");
                backdrop.setAttribute("aria-hidden", "false");
                modal.focus();
            }

            function closeModal() {
                backdrop.classList.remove("is-open");
                backdrop.setAttribute("aria-hidden", "true");
                statusEl.textContent = "";
                statusEl.className = "modal-status";
                if (lastFocus && lastFocus.focus) lastFocus.focus();
            }

            openBtn.addEventListener("click", openModal);
            closeBtn.addEventListener("click", closeModal);
            backdrop.addEventListener("click", (e) => {
                if (e.target === backdrop) closeModal();
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && backdrop.classList.contains("is-open"))
                    closeModal();
            });

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                statusEl.textContent = "Submitting...";
                statusEl.className = "modal-status";
                
                const title = document.getElementById("feedbackTitle").value.trim();
                const type = document.getElementById("feedbackOption").value;
                const description = document.getElementById("feedbackDescription").value.trim();
                const email = document.getElementById("feedbackEmail").value.trim();
                
                const payload = {
                    title: title,
                    body: `**Type:** ${type}\n${email ? `**From:** ${email}\n` : ''}\n**Description:**\n${description}`,
                    labels: [type]
                };

                submitBtn.disabled = true;

                try {
                    // Use the dynamic owner and repo from CONFIG
                    const url = `${CONFIG.endpoint}/${CONFIG.owner}/${CONFIG.repo}`;
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });

                    const contentType = res.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new Error("Unexpected response from server. Check your backend deployment.");
                    }

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || `Error: ${res.status}`);

                    statusEl.textContent = "Success! Your feedback has been sent.";
                    statusEl.className = "modal-status ok";
                    
                    form.reset();
                    setTimeout(closeModal, 2000);
                } catch (err) {
                    console.error("Submission Error:", err);
                    statusEl.textContent = err.message;
                    statusEl.className = "modal-status err";
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
